version: '3.8'

services:
  senafarm:
    build: .
    container_name: sena-farmerp-v7
    ports:
      - "3000:3000"
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: always
    labels:
      - "com.app.name=Sena FarmERP v7.0"
      - "com.app.description=Enterprise AI Agribusiness Platform"
    volumes:
      - ./:/app
      - /app/node_modules

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: sena-farmerp-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./:/var/www/senafarm:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - senafarm
    restart: always

volumes:
  data:
