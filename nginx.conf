# Nginx Configuration for Sena FarmERP v7.0
# Save as: /etc/nginx/sites-available/senafarm.conf
# Enable with: sudo ln -s /etc/nginx/sites-available/senafarm.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name senafarm.com www.senafarm.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name senafarm.com www.senafarm.com;
    
    # SSL Configuration (use Let's Encrypt or your cert)
    ssl_certificate /etc/letsencrypt/live/senafarm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/senafarm.com/privkey.pem;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Root directory
    root /var/www/senafarm;
    index index.html;
    
    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/javascript application/json;
    gzip_min_length 1000;
    gzip_proxied any;
    
    # Cache Control for Static Assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Cache Control for HTML (short duration)
    location ~ \.html$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Service Worker - No Cache
    location = /sw.js {
        add_header Cache-Control "max-age=0, no-cache, no-store, must-revalidate";
    }
    
    # Manifest - No Cache
    location = /manifest.webmanifest {
        add_header Cache-Control "max-age=0, no-cache, no-store, must-revalidate";
        add_header Content-Type "application/manifest+json";
    }
    
    # SPA Router - Serve index.html for all unknown routes
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Deny access to hidden files/folders
    location ~ /\. {
        deny all;
    }
    
    # Logging
    access_log /var/log/nginx/senafarm_access.log;
    error_log /var/log/nginx/senafarm_error.log;
}
